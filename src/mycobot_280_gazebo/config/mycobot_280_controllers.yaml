# mycobot_280_controllers.yaml
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
      use_local_topics: true

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_state_broadcaster:
  ros__parameters:
    use_sim_time: true
    state_interfaces:
      - position
      - velocity
      - effort

joint_trajectory_controller:
  ros__parameters:
    joints:
      - joint2_to_joint1
      - joint3_to_joint2
      - joint4_to_joint3
      - joint5_to_joint4
      - joint6_to_joint5
      - joint6output_to_joint6
    command_interfaces: [position]
    state_interfaces: [position, velocity]
    gains:
      joint2_to_joint1: {p: 100.0, i: 1.0, d: 5.0}
      joint3_to_joint2: {p: 100.0, i: 1.0, d: 5.0}
      joint4_to_joint3: {p: 80.0,  i: 1.0, d: 4.0}
      joint5_to_joint4: {p: 60.0,  i: 0.5, d: 3.0}
      joint6_to_joint5: {p: 40.0,  i: 0.3, d: 2.0}
      joint6output_to_joint6: {p: 30.0, i: 0.2, d: 1.0}
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
